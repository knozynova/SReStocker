name: Build Mods Bundle

on:
  workflow_dispatch:
    inputs:
      SAMFW_URL:
        description: "Direct SamFW download URL (.zip)"
        required: true
      APP_NAMES:
        description: "App folder names to extract (space separated)"
        required: true
        default: "SamsungSmartSuggestions"

jobs:
  build:
    name: Build Apps.zip
    runs-on: ubuntu-24.04
    env:
      SAMFW_URL: ${{ inputs.SAMFW_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download base Apps.zip
        run: |
          echo "Downloading base Apps.zip..."
          curl -L -o apps.zip "https://github.com/Xiatsuma/SReStocker-Mods/releases/download/v1.0/Apps.zip"
          if [ ! -f apps.zip ]; then
            echo "ERROR: Failed to download apps.zip"
            exit 1
          fi
          mkdir -p QuantumROM/Mods
          unzip -q apps.zip -d QuantumROM/Mods
          rm apps.zip
          echo "✅ Base Apps.zip loaded."

      - name: Install dependencies
        run: |
          sudo apt install -y p7zip-full lz4 android-sdk-libsparse-utils f2fs-tools fuse2fs fuse e2fsprogs python3 python3-pip zipalign unzip openjdk-17-jdk jq wget
          bash scripts/setup_directories.sh FIRMWARE WORK OUT

      - name: Download firmware via SamFW
        run: |
          source scripts/QuantumRom.sh
          DOWNLOAD_FIRMWARE "MODS_TEMP" "FIRMWARE"

      - name: Extract firmware
        run: |
          source scripts/QuantumRom.sh
          EXTRACT_FIRMWARE "FIRMWARE/MODS_TEMP"
          EXTRACT_FIRMWARE_IMG "FIRMWARE/MODS_TEMP"

      - name: Collect apps from firmware
        run: |
          for APP in ${{ github.event.inputs.APP_NAMES }}; do
            echo "Searching for: $APP"
            APP_PATH=$(find FIRMWARE/MODS_TEMP -type d -name "$APP" | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "WARNING: $APP not found, skipping"
              continue
            fi
            echo "Found $APP at: $APP_PATH"
            
            REL_PATH="${APP_PATH#FIRMWARE/MODS_TEMP/}"
            mkdir -p "QuantumROM/Mods/Apps/$APP/$(dirname "$REL_PATH")"
            cp -ra "$APP_PATH" "QuantumROM/Mods/Apps/$APP/$REL_PATH"
            
            # Find and copy permission files for this app
            find FIRMWARE/MODS_TEMP -type f \( -iname "*${APP}*.xml" -o -iname "*${APP//Samsung/}*.xml" \) -path "*/etc/permissions/*" 2>/dev/null | while read xml; do
              PERM_REL="${xml#FIRMWARE/MODS_TEMP/}"
              mkdir -p "QuantumROM/Mods/Apps/$APP/$(dirname "$PERM_REL")"
              cp -a "$xml" "QuantumROM/Mods/Apps/$APP/$PERM_REL"
              echo "  + permission: $(basename "$xml")"
            done
            
            echo "  ✓ $APP collected"
          done
          
          echo ""
          echo "=== Mods folder contents ==="
          find QuantumROM/Mods/Apps -type f | head -50

      - name: Package Apps.zip
        run: |
          cd QuantumROM/Mods
          7z a -tzip ../../Apps.zip .
          cd ../..
          echo "Done. Size: $(du -h Apps.zip | cut -f1)"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mods Bundle"
          tag_name: "mods-$(date +%Y%m%d%H%M%S)"
          files: Apps.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
